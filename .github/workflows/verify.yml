name: verify — the welcome must not lie

# A document is a claim about the world, and the world moves.
#
# This repository is the FIRST thing an external developer reads, and it is the ONE document she cannot
# check against anything: she has no source, no history, and no idea what we changed this morning. She
# can only obey. That is not a hypothetical — we watched an agent read a runbook that had gone stale in
# under an hour and repeat its mistake back to us with total confidence.
#
# So this doc gets a falsifier. It runs on every push, and weekly, and it FAILS when reality moves.

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * *'   # daily. The world moves faster than a week.
  workflow_dispatch:

jobs:
  no-versions:
    name: the docs name no versions (they cannot rot if they cannot rot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # THE STRUCTURAL INVARIANT, and the whole reason this job exists first.
      #
      # We pinned `abcli 0.5.13` in a runbook and it was stale within the hour — 0.5.14 shipped while we
      # were still talking about it. The fix is not "remember to update the doc". Nobody remembers. The
      # fix is that THIS DOCUMENT DOES NOT GET TO NAME A VERSION.
      #
      # Versions live where they are PINNED and where a machine enforces them:
      #   • abcli      → .abcli.lock       (in the app repo)
      #   • the plan   → .abcli-plan.lock  (in the app repo)
      #   • the devbox → the digest in devcontainer.json (in the app repo)
      #   • the engine → uv.lock           (in the app repo)
      #
      # Float at acquisition, pin at use. A doc that names no version cannot lie about one.
      - name: No version numbers or digests in the prose
        run: |
          set -euo pipefail
          bad=0
          for f in README.md AGENTS.md; do
            # semver-ish (v0.5.13, 1.2.3) and image digests
            if grep -nE '\bv?[0-9]+\.[0-9]+\.[0-9]+\b|sha256:[a-f0-9]{16,}' "$f" \
                 | grep -vE '^\s*[0-9]+:.*(ADR-|#)' ; then
              echo "::error file=$f::this document names a version. It will be wrong, and she cannot tell."
              echo "  Versions belong in a lockfile a machine enforces — not in prose a human forgets."
              bad=1
            fi
          done
          [ "$bad" -eq 0 ] && echo "✓ the prose names no version — it has nothing to go stale about"
          exit "$bad"

  scripts:
    name: the bootstrap scripts are sound
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck scripts/iter-setup.sh

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          # -Settings applies PSScriptAnalyzerSettings.psd1 — the two rules it excludes
          # (Write-Host in an interactive installer; BOM on an `iwr | iex`-delivered file)
          # are documented there, on the record.
          $r = Invoke-ScriptAnalyzer -Path scripts/iter-setup.ps1 -Settings ./PSScriptAnalyzerSettings.psd1 -Severity Error,Warning
          if ($r) { $r | Format-Table; exit 1 }
          Write-Host "✓ clean"

      # The script must never widen a credential (ADR-106). This is cheap, and it is the one mistake
      # that would pass every functional test we could write — because the wider token WORKS.
      - name: The scripts never touch the engine credential, and never ask for a wide scope
        run: |
          set -euo pipefail
          bad=0

          # Look for USE, not MENTION. The scripts talk about ENGINE_SDK_TOKEN at length — to say they
          # do not touch it — and a gate that fails a script for EXPLAINING the rule it obeys is the
          # same false alarm we have chased all week. A red that is wrong teaches everyone to ignore red.
          #
          # So: strip comments, then look for an assignment or an expansion. That is the difference
          # between a script that names the boundary and a script that crosses it.
          # Strips `# line comments` AND PowerShell's `<# block #>`. Written in awk because the obvious
          # sed one-liner was WRONG and PASSED: its delimiter collided with a pipe inside the pattern,
          # sed errored, the .ps1 never reached the check — and the job went GREEN while inspecting half
          # the scripts. It was caught by breaking the gate on purpose, which is the only reason it is
          # not still broken. A guard you have not falsified is a guard you are only hoping for.
          strip_comments() {
            awk '
              /<#/            { inblock = 1 }
              inblock         { if (/#>/) inblock = 0; next }
                              { sub(/^[[:space:]]*#.*$/, ""); print }
            ' "$1"
          }
          code="$(mktemp)"
          for f in scripts/*.sh scripts/*.ps1; do strip_comments "$f" >> "$code"; done

          # THE INVARIANT IS "THE TWO KEYS ARE NEVER THE SAME VALUE" — not "never name the variable".
          #
          # The first version of this guard banned ENGINE_SDK_TOKEN outright. It was wrong, and it would
          # have BLOCKED THE CORRECT EVOLUTION: the setup script legitimately acquires the engine token
          # (the properly scoped one) and hands it to VS Code, which is exactly what it should do. A guard
          # that fails correct code is not strict — it is imprecise, and imprecise guards get switched off.
          #
          # What ADR-106 actually forbids is REUSE: assigning the image key (or a gh OAuth token, which
          # carries scope `repo`) into ENGINE_SDK_TOKEN. That is the one-line change that would work
          # perfectly, pass every functional test, and delete the boundary.
          if grep -nE 'ENGINE_SDK_TOKEN[[:space:]]*=[[:space:]]*.*(PKG_TOKEN|pkgToken|gh auth token|GH_TOKEN|GITHUB_TOKEN)' "$code"; then
            echo "::error::a bootstrap script assigns the IMAGE key (or a gh token) into ENGINE_SDK_TOKEN."
            echo "  Two doors, two keys (ADR-106). Automation may ACQUIRE a credential; it may never WIDEN"
            echo "  one. A token that opens both planes is the boundary, gone — and it would work perfectly,"
            echo "  which is precisely why it is forbidden."
            bad=1
          fi
          if grep -nE 'gh auth (token|login|refresh)' "$code"; then
            echo "::error::a bootstrap script reaches for a gh OAuth token."
            echo "  gh's token carries scope 'repo' — read AND WRITE on every repo the account can reach."
            echo "  We need to pull an image. Hold the narrowest key that opens the door."
            bad=1
          fi
          if grep -nE 'scopes=[^&"'"'"']*\b(repo|write|admin|delete)' scripts/*; then
            echo "::error::a bootstrap script requested a scope wider than read:packages."
            bad=1
          fi
          # the token must never reach the command line or the disk
          if grep -nE 'docker login[^|]*-p |--password [^s]' scripts/*; then
            echo "::error::a token on the command line lands in shell history, forever. Use --password-stdin."
            bad=1
          fi
          [ "$bad" -eq 0 ] && echo "✓ narrow scope, stdin only, engine plane untouched"
          exit "$bad"

# ── WHY THERE IS NO "does the private stuff still exist" JOB HERE ─────────────
# It was here. It needed a token — the private repos it checks (start-app, engine-sdk)
# cannot be read without one — and putting a token in THIS repository is precisely the
# mistake this platform spent a week deleting.
#
# This repo is the most exposed surface we own: PUBLIC by design, the first thing a
# stranger opens, the one we WANT strangers to read. "Fork PRs do not receive secrets"
# is true, and it is the right answer to the wrong question. A secret does not belong
# in the room we built for outsiders. Full stop.
#
# So the reality check lives in the TRUSTED repo (omnianvil/platform), which already
# holds the credentials, which no external developer can push to, and which fails loudly
# when this document starts lying. The check watches this repo. It does not live in it.
#
# See: omnianvil/platform → .github/workflows/verify-welcome.yml

